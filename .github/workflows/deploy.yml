name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler@4

      # zfb (@takazudo/zfb) and the panel (@takazudo/zdtp) now come from npm.
      # The `zfb` CLI binary ships with @takazudo/zfb, so `pnpm build` (zfb build)
      # runs the local node_modules/.bin/zfb — no cargo, no sibling clones.
      - name: Install consumer deps
        run: pnpm install --frozen-lockfile

      - name: Verify zfb CLI
        run: pnpm exec zfb --version

      - name: Build consumer
        run: pnpm build

      - name: Compute deploy branch slug
        id: branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Use pr-<number> as the slug for PRs — Cloudflare Pages truncates branch
          # alias subdomains to 28 chars, silently breaking the preview URL for any
          # branch name longer than that. pr-<n> is stable and short.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DEPLOY_BRANCH="pr-${PR_NUMBER}"
          else
            DEPLOY_BRANCH="main"
          fi
          echo "deploy_branch=${DEPLOY_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Idempotent: create on first run, no-op on subsequent runs.
          # wrangler@4 no longer auto-creates the project on `pages deploy`.
          out=$(wrangler pages project create zudo-design-token-panel-example-zfb-tailwind \
            --production-branch=main 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ "$rc" -eq 0 ]; then
            echo "Project created."
          elif echo "$out" | grep -qE "already exists|8000077|duplicate"; then
            echo "Project already exists — continuing."
          else
            echo "Project create failed with unexpected error."
            exit "$rc"
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ steps.branch.outputs.deploy_branch }}
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3..."
            if wrangler pages deploy dist \
              --project-name=zudo-design-token-panel-example-zfb-tailwind \
              --branch="${DEPLOY_BRANCH}" \
              --commit-hash="${GITHUB_SHA}" \
              --commit-message="Deploy: ${GITHUB_SHA}"; then
              echo "Deploy succeeded on attempt $attempt"
              if [ "${DEPLOY_BRANCH}" = "main" ]; then
                echo "deploy_url=https://zudo-design-token-panel-example-zfb-tailwind.pages.dev/" >> "$GITHUB_OUTPUT"
              else
                echo "deploy_url=https://${DEPLOY_BRANCH}.zudo-design-token-panel-example-zfb-tailwind.pages.dev/" >> "$GITHUB_OUTPUT"
              fi
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed, retrying in 150 seconds..."
              sleep 150
            fi
          done
          echo "Deploy failed after 3 attempts"
          exit 1

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.deploy.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          DEPLOY_BRANCH: ${{ steps.branch.outputs.deploy_branch }}
        with:
          script: |
            const deployUrl = process.env.DEPLOY_URL;
            const deployBranch = process.env.DEPLOY_BRANCH;
            const marker = '<!-- cf-preview-branch -->';
            const body = `${marker}\n### Preview deployed\n\nBranch \`${deployBranch}\` is live at: ${deployUrl}\n\n_Updated for commit \`${context.sha.substring(0, 7)}\`._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
